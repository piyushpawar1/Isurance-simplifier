databases:
  - name: insurance-simplifier-db
    databaseName: insurance_simplifier
    user: insurance_simplifier
    plan: free

services:
  # ── API Server ────────────────────────────────────────────────────────────
  - type: web
    name: insurance-simplifier-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: insurance-simplifier-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false        # you will paste this in the Render dashboard
      - key: SESSION_SECRET
        generateValue: true

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: insurance-simplifier-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/insurance-simplifier exec vite build --config vite.render.config.ts
    staticPublishPath: ./artifacts/insurance-simplifier/dist/public
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # paste your API service URL here, e.g. https://insurance-simplifier-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://insurance-simplifier-api.onrender.com/api/:splat
