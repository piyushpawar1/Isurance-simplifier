kind = "web"
previewPath = "/"
title = "Insurance Simplifier"
version = "1.0.0"
id = "artifacts/insurance-simplifier"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22063

[services.development]
run = "pnpm --filter @workspace/insurance-simplifier run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insurance-simplifier", "run", "build" ]
publicDir = "artifacts/insurance-simplifier/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22063"
BASE_PATH = "/"
